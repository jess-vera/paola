<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAOLA — Biosignal Drawing Interpreter</title>
<meta name="description" content="Draw a gesture. AI interprets it as a biosignal. By Jess Adriana Rivera.">
<meta name="author" content="Jess Adriana Rivera">
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<!--
  TO USE FUTURA PT: Add your Adobe Fonts kit embed below.
  Go to fonts.adobe.com, find Futura PT, create a Web Project, copy the embed code.
  Example: <link rel="stylesheet" href="https://use.typekit.net/YOUR_KIT_ID.css">
-->
<style>
  :root {
    --bg: #ffffff;
    --accent: #4a0e28;
    --accent-bright: #6b1535;
    --accent-dim: rgba(75, 14, 40, 0.6);
    --accent-ghost: rgba(75, 14, 40, 0.15);
    --text: rgba(0, 0, 0, 0.6);
    --text-dim: rgba(0, 0, 0, 0.35);
    --text-ghost: rgba(0, 0, 0, 0.1);
    --font: 'futura-pt', 'Futura', 'Century Gothic', sans-serif;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: var(--bg);
    overflow: hidden;
    font-family: var(--font);
    font-weight: 400;
    color: var(--text);
    cursor: crosshair;
  }
  canvas { display: block; }

  .corner-label {
    position: fixed;
    font-family: var(--font);
    font-size: 10px; font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text);
    z-index: 10; pointer-events: none;
  }
  .tl { top: 20px; left: 24px; }
  .tl-title {
    font-size: 18px; font-weight: 700;
    letter-spacing: 8px;
    color: #a8284e;
    animation: pulse 4.5s ease-in-out infinite;
  }
  .tr { top: 20px; right: 24px; }
  .br { bottom: 20px; right: 24px; color: var(--accent); }

  .instructions {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center; z-index: 10; pointer-events: none;
    transition: opacity 0.5s ease;
  }
  .instructions .main {
    font-family: var(--font);
    font-size: 13px; font-weight: 400;
    letter-spacing: 3px;
    color: var(--accent); text-transform: uppercase;
  }
  .instructions .sub {
    font-size: 11px; font-weight: 400;
    color: var(--text-ghost); margin-top: 8px;
  }

  .processing {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: var(--font);
    font-size: 11px; font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0; transition: opacity 0.3s ease;
    z-index: 10; pointer-events: none;
  }

  .signal-type {
    position: fixed; bottom: 100px; left: 24px;
    font-family: var(--font);
    font-size: 18px; font-weight: 400;
    letter-spacing: 3px; text-transform: uppercase;
    opacity: 0; transition: opacity 0.6s ease;
    z-index: 10; pointer-events: none;
  }
  .signal-desc {
    position: fixed; bottom: 56px; left: 24px;
    max-width: 340px; font-size: 12px; font-weight: 400;
    color: var(--text-dim); line-height: 1.7;
    opacity: 0; transition: opacity 0.6s ease 0.2s;
    z-index: 10; pointer-events: none;
  }

  .credit {
    position: fixed; bottom: 20px; left: 24px;
    font-size: 10px; font-weight: 400;
    letter-spacing: 4px; text-transform: uppercase;
    font-family: var(--font);
    z-index: 10;
  }
  .credit a {
    color: var(--accent);
    text-decoration: none;
    transition: opacity 0.3s;
    opacity: 1;
  }
  .credit a:hover {
    opacity: 0.8;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
</style>
</head>
<body>
<script>
/*
  PAOLA — Biosignal Drawing Interpreter
  Jess Adriana Rivera, 2026

  Draw a gesture on the canvas.
  Press SPACE — Gemini interprets the drawing as a biosignal.
  Particles emerge from the gesture, shaped by the detected
  signal pattern: rest, drift, calm, focus, or surge.

  Built with p5.js and Google Gemini API.
*/

let API_KEY = 'PASTE_YOUR_KEY_HERE';

let allStrokes = [];
let currentStroke = [];
let particles = [];
let ripples = [];
let isDrawing = false;
let hasDrawn = false;
let isProcessing = false;
let currentBand = null;
let noiseOffset = 0;

let signalTypeEl, signalDescEl, bandIndicatorEl;
let instructionsEl, processingEl;

const BANDS = {
  rest:   { color: [270, 60, 85], size: [8, 22], label: 'REST',   behavior: 'drift' },
  drift:  { color: [175, 70, 80], size: [4, 14], label: 'DRIFT',  behavior: 'morph' },
  calm:   { color: [145, 65, 75], size: [3, 10], label: 'CALM',   behavior: 'flow' },
  focus:  { color: [35, 80, 90],  size: [2, 6],  label: 'FOCUS',  behavior: 'sharp' },
  surge:  { color: [55, 10, 98],  size: [1, 4],  label: 'SURGE',  behavior: 'burst' }
};

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  background(0, 0, 100);
  buildUI();

  for (let i = 0; i < 6; i++) {
    ripples.push(new Ripple(random(width), random(height)));
  }
}

function buildUI() {
  createDiv('PAOLA').class('corner-label tl tl-title');
  bandIndicatorEl = createDiv('').class('corner-label tr');
  createDiv('Gemini + p5.js').class('corner-label br');

  instructionsEl = createDiv(
    '<span class="main">Draw a gesture — AI reads it as a body signal</span><br>' +
    '<span class="sub">Press SPACE to interpret · C to clear</span>'
  ).class('instructions');

  processingEl = createDiv('Interpreting biosignal...').class('processing');
  signalTypeEl = createDiv('').class('signal-type');
  signalDescEl = createDiv('').class('signal-desc');

  let creditEl = createDiv('<a href="https://jessadrianarivera.xyz/" target="_blank">made by JAR, 2026</a>');
  creditEl.class('credit');
}

function draw() {
  background(0, 0, 100, 4);
  noiseOffset += 0.002;

  drawAmbientRipples();

  for (let s of allStrokes) drawStroke(s, 15);
  if (currentStroke.length > 0) drawStroke(currentStroke, 50);

  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].display();
    if (particles[i].isDead()) particles.splice(i, 1);
  }

  if (currentBand && allStrokes.length > 0) {
    let band = BANDS[currentBand];
    let rate = currentBand === 'surge' ? 5 : currentBand === 'focus' ? 3 : 2;
    for (let i = 0; i < rate; i++) {
      let stroke = random(allStrokes);
      if (stroke.length > 0) {
        let pt = random(stroke);
        particles.push(new Particle(pt.x, pt.y, band));
      }
    }
  }
}

// Ripple class for ambient background
class Ripple {
  constructor(x, y) {
    this.originX = x;
    this.originY = y;
    this.radius = random(10, 40);
    this.maxRadius = random(150, 350);
    this.growSpeed = random(0.3, 0.8);
    this.life = 255;
  }

  update() {
    this.radius += this.growSpeed;
    this.life = map(this.radius, 0, this.maxRadius, 6, 0);

    if (this.radius > this.maxRadius) {
      this.originX = random(width);
      this.originY = random(height);
      this.radius = random(5, 20);
      this.maxRadius = random(150, 350);
      this.growSpeed = random(0.3, 0.8);
      this.life = 6;
    }
  }

  display() {
    let h = currentBand ? BANDS[currentBand].color[0] : 335;

    // dark outer stroke
    noFill();
    stroke(h, 12, 15, this.life * 0.6);
    strokeWeight(1.2);
    ellipse(this.originX, this.originY, this.radius * 2);

    // lighter shadow trailing behind
    stroke(h, 5, 82, this.life * 0.35);
    strokeWeight(3);
    ellipse(this.originX, this.originY, this.radius * 2 - 8);
  }
}

function drawAmbientRipples() {
  for (let r of ripples) {
    r.update();
    r.display();
  }
}

function drawStroke(pts, a) {
  if (pts.length < 2) return;
  noFill();
  let h = currentBand ? BANDS[currentBand].color[0] : 335;
  let s = currentBand ? BANDS[currentBand].color[1] : 50;

  for (let i = 1; i < pts.length; i++) {
    let p0 = pts[i - 1];
    let p1 = pts[i];
    let d = dist(p0.x, p0.y, p1.x, p1.y);
    let sw = map(d, 0, 50, 3, 0.5, true);

    stroke(h, s * 0.4, 50, a * 0.2);
    strokeWeight(sw + 4);
    line(p0.x, p0.y, p1.x, p1.y);

    stroke(h, s, 30, a);
    strokeWeight(sw);
    line(p0.x, p0.y, p1.x, p1.y);
  }
}

function mousePressed() {
  isDrawing = true;
  currentStroke = [];
  hasDrawn = true;
  instructionsEl.style('opacity', '0');
}

function mouseDragged() {
  if (!isDrawing) return;
  currentStroke.push({ x: mouseX, y: mouseY });
}

function mouseReleased() {
  if (!isDrawing) return;
  isDrawing = false;
  if (currentStroke.length > 2) allStrokes.push([...currentStroke]);
  currentStroke = [];
}

function keyPressed() {
  if (key === ' ' && hasDrawn && !isProcessing) {
    interpretDrawing();
    return false;
  }
  if (key === 'c' || key === 'C') clearCanvas();
}

function clearCanvas() {
  allStrokes = [];
  currentStroke = [];
  particles = [];
  currentBand = null;
  hasDrawn = false;
  background(0, 0, 100);
  signalTypeEl.style('opacity', '0');
  signalDescEl.style('opacity', '0');
  bandIndicatorEl.html('');
  instructionsEl.style('opacity', '1');
}

async function interpretDrawing() {
  if (!API_KEY || API_KEY === 'PASTE_YOUR_KEY_HERE') return;
  isProcessing = true;
  processingEl.style('opacity', '1');

  let cnv = document.querySelector('canvas');
  let dataUrl = cnv.toDataURL('image/png');
  let base64Data = dataUrl.split(',')[1];

  const systemPrompt = [
    'You are a biosignal interpreter for an art installation.',
    'Look at this drawing — a gesture made by a human hand on a digital canvas.',
    '',
    'Interpret the gesture as if it were a biological signal pattern.',
    'Based on the visual qualities (speed implied by line density,',
    'pressure implied by thickness, rhythm, curvature, spatial distribution),',
    'classify it as ONE of these five signal patterns:',
    '',
    '- rest: slow, heavy, expansive gestures — deep stillness',
    '- drift: dreamy, flowing, meditative strokes — edge of consciousness',
    '- calm: balanced, rhythmic, steady movements — relaxed awareness',
    '- focus: sharp, quick, angular marks — concentrated attention',
    '- surge: rapid, dense, explosive energy — peak intensity',
    '',
    'Respond ONLY with valid JSON, no markdown, no backticks:',
    '{"band": "one of rest/drift/calm/focus/surge",',
    '"description": "A poetic 1-2 sentence interpretation of what this',
    'gesture reveals about the body that drew it. Be evocative and',
    'specific to what you see."}'
  ].join('\n');

  try {
    const res = await fetch(
      'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + API_KEY,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [
              { text: systemPrompt },
              { inline_data: { mime_type: 'image/png', data: base64Data } }
            ]
          }],
          generationConfig: { temperature: 0.9, maxOutputTokens: 200 }
        })
      }
    );

    const data = await res.json();
    let text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    text = text.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
    applyInterpretation(JSON.parse(text));
  } catch (err) {
    console.error('API error:', err);
    applyInterpretation({
      band: random(Object.keys(BANDS)),
      description: 'The signal pulses with an energy that defies classification — a body in flux, reaching toward expression.'
    });
  }

  isProcessing = false;
  processingEl.style('opacity', '0');
}

function applyInterpretation(result) {
  let band = result.band?.toLowerCase();
  if (!BANDS[band]) band = 'calm';

  currentBand = band;
  let cfg = BANDS[band];

  signalTypeEl.html(cfg.label + ' WAVE');
  signalTypeEl.style('color', 'hsl(' + cfg.color[0] + ',' + cfg.color[1] + '%,' + (cfg.color[2] * 0.4) + '%)');
  signalTypeEl.style('opacity', '1');

  signalDescEl.html(result.description);
  signalDescEl.style('opacity', '1');

  bandIndicatorEl.html(cfg.label);
  bandIndicatorEl.style('color', 'hsl(' + cfg.color[0] + ',' + cfg.color[1] + '%,' + (cfg.color[2] * 0.4) + '%)');

  for (let stroke of allStrokes) {
    for (let i = 0; i < stroke.length; i += 3) {
      let pt = stroke[i];
      for (let j = 0; j < 3; j++) {
        particles.push(new Particle(pt.x, pt.y, cfg));
      }
    }
  }
}

class Particle {
  constructor(x, y, bandCfg) {
    this.x = x + random(-5, 5);
    this.y = y + random(-5, 5);
    this.band = bandCfg;
    this.sz = random(bandCfg.size[0], bandCfg.size[1]);
    this.life = 255;
    this.decay = 255 / random(120, 300);
    this.nOff = random(1000);

    let ang, spd;
    switch (bandCfg.behavior) {
      case 'drift':
        ang = random(TWO_PI); spd = random(0.1, 0.4);
        this.vx = cos(ang) * spd; this.vy = sin(ang) * spd - 0.2;
        break;
      case 'morph':
        ang = random(TWO_PI); spd = random(0.3, 1.0);
        this.vx = cos(ang) * spd; this.vy = sin(ang) * spd;
        break;
      case 'flow':
        ang = random(-PI * 0.3, PI * 0.3) - HALF_PI; spd = random(0.5, 1.5);
        this.vx = cos(ang) * spd; this.vy = sin(ang) * spd;
        break;
      case 'sharp':
        ang = random(TWO_PI); spd = random(1, 3);
        this.vx = cos(ang) * spd; this.vy = sin(ang) * spd;
        break;
      case 'burst':
        ang = random(TWO_PI); spd = random(2, 5);
        this.vx = cos(ang) * spd; this.vy = sin(ang) * spd;
        break;
      default:
        this.vx = random(-1, 1); this.vy = random(-1, 1);
    }
  }

  update() {
    let n = noise(this.x * 0.005, this.y * 0.005, this.nOff);
    let nAng = n * TWO_PI * 2;
    this.vx += cos(nAng) * 0.05;
    this.vy += sin(nAng) * 0.05;
    this.vx *= 0.98;
    this.vy *= 0.98;
    this.x += this.vx;
    this.y += this.vy;
    this.life -= this.decay;
    this.nOff += 0.01;

    if (this.band.behavior === 'morph' || this.band.behavior === 'drift') {
      this.sz += sin(frameCount * 0.05 + this.nOff) * 0.3;
    }
  }

  display() {
    let a = map(this.life, 0, 255, 0, 55);
    let h = this.band.color[0];
    let s = this.band.color[1];
    let b = this.band.color[2];

    noStroke();
    fill(h, s * 0.4, b * 0.6, a * 0.2);
    ellipse(this.x, this.y, this.sz * 2.5);
    fill(h, s * 0.8, b * 0.5, a);
    ellipse(this.x, this.y, this.sz);
    fill(h, s * 0.3, b * 0.8, a * 0.35);
    ellipse(this.x, this.y, this.sz * 0.4);
  }

  isDead() { return this.life <= 0; }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  background(0, 0, 100);
}
</script>
</body>
</html>
